<!DOCTYPE html>
<html>
<head>
<title>English Sentence Game - Jaiakash</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #fff3e6, #ffe0cc);
  text-align: center;
  padding: 20px;
  overflow-x: hidden;
}

h1 { color: #990000; }

button {
  padding: 10px 20px;
  font-size: 16px;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:disabled { background: gray; }

input {
  padding: 10px;
  width: 60%;
  font-size: 16px;
}

#wordBox {
  font-size: 25px;
  font-weight: bold;
  color: blue;
}

#timer, #score, #playerName {
  font-size: 20px;
  font-weight: bold;
}

/* TIME BAR */
#timeBarContainer {
  width: 60%;
  height: 22px;
  background: #ddd;
  margin: 10px auto;
  border-radius: 15px;
  overflow: hidden;
}

#timeBar {
  height: 100%;
  width: 100%;
  background: green;
  transition: width 0.1s linear; /* smooth real movement */
  box-shadow: 0 0 15px green;
}

@keyframes glowPulse {
  0% { box-shadow: 0 0 10px red; }
  50% { box-shadow: 0 0 25px red; }
  100% { box-shadow: 0 0 10px red; }
}

.glowDanger {
  animation: glowPulse 0.8s infinite;
}

/* SHAKE */
@keyframes shakeScreen {
  0% { transform: translate(0px, 0px); }
  25% { transform: translate(-10px, 5px); }
  50% { transform: translate(10px, -5px); }
  75% { transform: translate(-10px, 5px); }
  100% { transform: translate(0px, 0px); }
}

.shake { animation: shakeScreen 0.5s; }

/* FLASH */
@keyframes lightning {
  0% { background: white; }
  50% { background: yellow; }
  100% { background: linear-gradient(to right, #fff3e6, #ffe0cc); }
}

.flash { animation: lightning 0.3s 3; }

#celebration {
  font-size: 40px;
  display: none;
  margin-top: 20px;
}

/* CERTIFICATE */
#certificate {
  border: 5px solid gold;
  padding: 20px;
  width: 70%;
  margin: auto;
  background: white;
  display: none;
  margin-top: 20px;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<h1>🎮 English Sentence Game 🎮</h1>

<div id="nameBox">
  <h2>Enter Your Name:</h2>
  <input id="nameInput" placeholder="Your Name">
  <br><br>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="gameArea" style="display:none;">
  <h3 id="playerName"></h3>
  <h2 id="wordBox"></h2>
  <h3 id="timer">⏱ Time: 0</h3>

  <div id="timeBarContainer">
    <div id="timeBar"></div>
  </div>

  <h3 id="score">🏆 Score: 0</h3>

  <br>
  <input id="sentence" placeholder="Type your sentence here">
  <br><br>

  <button onclick="checkAnswer()" id="checkBtn">Check Answer</button>

  <h2 id="result"></h2>
  <h3 id="counter"></h3>
  <h2 id="reward"></h2>
</div>

<div id="celebration">🎉🎉 CONGRATULATIONS 🎉🎉</div>

<div id="certificate">
  <h1>🏅 Participation Certificate</h1>
  <h2 id="certName"></h2>
  <h3 id="certScore"></h3>
  <h3 id="certMedal"></h3>
  <p>For excellent performance in English Sentence Game.</p>
</div>

<button onclick="downloadCertificate()" id="downloadBtn" style="display:none;">
Download Certificate
</button>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
let player="";
let timeLimit=30;
let maxQuestions=5;

let words=["discover", "plunge", "white", "wander", "walk", "stretch", "stir", "find", "hesitate", "leap", "come", "quench", "notice", "stare", "call", "reply", "join", "invite", "stride", "say", "run", "wait", "slap", "stagger", "push", "roll", "struggle", "gasp", "continue", "realize", "leave", "insist", "slip", "go", "stand", "scowl", "swim", "dive", "surface", "laugh", "teach", "ask", "concede", "drink", "look", "smile"];
let questionCount=0;
let currentWord="";
let score=0;
let usedWords=[];
let timer;
let timeLeft;

/* START GAME */
function startGame(){
  player=document.getElementById("nameInput").value;
  if(player===""){alert("Enter your name");return;}

  questionCount=0;
  score=0;
  usedWords=[];

  document.getElementById("score").innerHTML="🏆 Score: 0";
  document.getElementById("result").innerHTML="";
  document.getElementById("reward").innerHTML="";
  document.getElementById("celebration").style.display="none";
  document.getElementById("certificate").style.display="none";
  document.getElementById("downloadBtn").style.display="none";

  document.getElementById("nameBox").style.display="none";
  document.getElementById("gameArea").style.display="block";
  document.getElementById("playerName").innerHTML="Player: "+player;

  newWord();
}

/* REAL CLOCK TIMER */
function startTimer(){
  clearInterval(timer);

  let startTime = Date.now();
  let endTime = startTime + (timeLimit * 1000);

  let bar = document.getElementById("timeBar");

  timer = setInterval(function(){

    let now = Date.now();
    let timeRemaining = Math.max(0, endTime - now);
    timeLeft = Math.ceil(timeRemaining / 1000);

    document.getElementById("timer").innerHTML =
      "⏱ Time: " + timeLeft;

    let percent = (timeRemaining / (timeLimit * 1000)) * 100;
    bar.style.width = percent + "%";

    if(percent<=50 && percent>20){
      bar.style.background="orange";
    }
    if(percent<=20){
      bar.style.background="red";
      bar.classList.add("glowDanger");
    }

    if(timeLeft===3){
      document.body.classList.add("flash");
      setTimeout(()=>document.body.classList.remove("flash"),500);
    }

    if(timeRemaining<=0){
      clearInterval(timer);
      document.body.classList.add("shake");
      setTimeout(()=>document.body.classList.remove("shake"),600);
      document.getElementById("result").innerHTML="⏰ TIME OVER!";
      setTimeout(newWord,1500);
    }

  },100);
}

function getRandomWord(){
  let available=words.filter(w=>!usedWords.includes(w));
  let w=available[Math.floor(Math.random()*available.length)];
  usedWords.push(w);
  return w;
}

function newWord(){
  if(questionCount>=maxQuestions){endGame();return;}
  clearInterval(timer);
  document.getElementById("checkBtn").disabled=false;

  currentWord=getRandomWord();
  questionCount++;

  document.getElementById("wordBox").innerHTML=
  "Question "+questionCount+": Use word - "+currentWord;

  document.getElementById("sentence").value="";
  document.getElementById("counter").innerHTML=
  questionCount+" / "+maxQuestions;

  startTimer();
}

function checkAnswer(){
  clearInterval(timer);

  let s=document.getElementById("sentence").value.toLowerCase();
  if(s.includes(currentWord)&&s.length>10){
    score++;
    document.getElementById("result").innerHTML="✅ Correct!";
  }else{
    document.getElementById("result").innerHTML="❌ Wrong!";
  }

  document.getElementById("score").innerHTML="🏆 Score: "+score;
  document.getElementById("checkBtn").disabled=true;
  setTimeout(newWord,1500);
}

function endGame(){
  document.getElementById("wordBox").innerHTML="🎉 Game Over!";
  document.getElementById("celebration").style.display="block";
}
</script>

</body>
</html>
